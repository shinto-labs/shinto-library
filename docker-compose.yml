services:
  database:
    image: devteamregistry02.azurecr.io/shinto-mimir:1.4.5
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - DATABASE_NAME=mimir
      - MAKE_DEV_DATA=false
    ports:
      - "5433:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -U postgres && psql -U postgres -d mimir -tAc "SELECT 1 FROM base.user_active LIMIT 1" >/dev/null 2>&1',
        ]
      interval: 6s
      timeout: 3s
      retries: 20
    networks:
      - shinto

  integration_tests:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./integration_tests:/integration_tests
    depends_on:
      database:
        condition: service_healthy
    networks:
      - shinto

networks:
  shinto:
